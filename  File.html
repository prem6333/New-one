<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Download</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* === CSS Variables === */
        :root {
            --bg: #0a0e17;
            --card: rgba(16, 22, 36, 0.85);
            --card-border: rgba(0, 255, 170, 0.15);
            --accent: #00ffaa;
            --accent-dim: rgba(0, 255, 170, 0.15);
            --accent-glow: rgba(0, 255, 170, 0.4);
            --fg: #e8f0f2;
            --muted: #7a8ba5;
            --danger: #ff4f6e;
            --warning: #ffb347;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* === Floating Background Canvas === */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* === Gradient Orbs (CSS layer bhi) === */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.35;
            z-index: 0;
            pointer-events: none;
            animation: orbFloat 12s ease-in-out infinite alternate;
        }
        .orb-1 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #00ffaa, transparent 70%);
            top: -10%; left: -5%;
            animation-duration: 14s;
        }
        .orb-2 {
            width: 350px; height: 350px;
            background: radial-gradient(circle, #ff4f6e, transparent 70%);
            bottom: -10%; right: -5%;
            animation-duration: 18s;
            animation-delay: -4s;
        }
        .orb-3 {
            width: 250px; height: 250px;
            background: radial-gradient(circle, #ffb347, transparent 70%);
            top: 50%; left: 60%;
            animation-duration: 16s;
            animation-delay: -8s;
            opacity: 0.2;
        }

        @keyframes orbFloat {
            0%   { transform: translate(0, 0) scale(1); }
            50%  { transform: translate(40px, -30px) scale(1.15); }
            100% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* === Main Container === */
        .main-wrapper {
            position: relative;
            z-index: 10;
            padding: 24px;
            width: 100%;
            max-width: 440px;
        }

        /* === App Card === */
        .app-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 36px 28px 32px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow:
                0 0 60px rgba(0, 255, 170, 0.06),
                0 20px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: cardIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* === App Icon === */
        .app-icon-wrap {
            width: 96px;
            height: 96px;
            margin: 0 auto 20px;
            border-radius: 22px;
            background: linear-gradient(135deg, #00ffaa, #00c9ff);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(0, 255, 170, 0.3);
            animation: iconPulse 3s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }
        .app-icon-wrap::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, rgba(255,255,255,0.15), transparent);
            animation: iconSpin 4s linear infinite;
        }
        .app-icon-wrap i {
            font-size: 40px;
            color: var(--bg);
            position: relative;
            z-index: 1;
        }

        @keyframes iconPulse {
            0%, 100% { box-shadow: 0 8px 32px rgba(0, 255, 170, 0.3); }
            50%      { box-shadow: 0 8px 48px rgba(0, 255, 170, 0.5); }
        }
        @keyframes iconSpin {
            to { transform: rotate(360deg); }
        }

        /* === App Info === */
        .app-name {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }
        .app-dev {
            font-size: 13px;
            color: var(--muted);
            font-weight: 300;
            margin-bottom: 6px;
        }

        /* === Rating Row === */
        .rating-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        .stars {
            display: flex;
            gap: 2px;
        }
        .stars i {
            font-size: 13px;
            color: var(--warning);
        }
        .stars i.empty {
            color: rgba(255, 179, 71, 0.25);
        }
        .rating-text {
            font-size: 12px;
            color: var(--muted);
        }

        /* === Stats Row === */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 24px;
        }
        .stat-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 12px 8px;
        }
        .stat-val {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
        }
        .stat-label {
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* === Download Button === */
        .download-btn {
            width: 100%;
            padding: 16px 24px;
            border: none;
            border-radius: 14px;
            font-family: 'Outfit', sans-serif;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #00ffaa, #00c9ff);
            color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s, box-shadow 0.3s;
            box-shadow: 0 6px 30px rgba(0, 255, 170, 0.3);
            animation: btnGlow 2.5s ease-in-out infinite;
        }
        .download-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 40px rgba(0, 255, 170, 0.5);
        }
        .download-btn:active {
            transform: translateY(0) scale(0.98);
        }
        .download-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to right,
                transparent 0%,
                rgba(255,255,255,0.2) 50%,
                transparent 100%
            );
            transform: rotate(30deg) translateX(-100%);
            animation: btnShine 3s ease-in-out infinite;
        }

        @keyframes btnGlow {
            0%, 100% { box-shadow: 0 6px 30px rgba(0, 255, 170, 0.3); }
            50%      { box-shadow: 0 6px 40px rgba(0, 255, 170, 0.5); }
        }
        @keyframes btnShine {
            0%, 70%, 100% { transform: rotate(30deg) translateX(-100%); }
            85%           { transform: rotate(30deg) translateX(100%); }
        }

        .download-btn i {
            font-size: 20px;
            position: relative;
            z-index: 1;
        }
        .download-btn span {
            position: relative;
            z-index: 1;
        }

        /* === Download Progress (hidden by default) === */
        .download-progress {
            display: none;
            width: 100%;
            margin-top: 16px;
        }
        .download-progress.active {
            display: block;
            animation: fadeUp 0.4s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.08);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ffaa, #00c9ff);
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            font-size: 11px;
            color: var(--muted);
        }

        /* === Success Message === */
        .success-msg {
            display: none;
            margin-top: 16px;
            padding: 12px 16px;
            background: rgba(0, 255, 170, 0.08);
            border: 1px solid rgba(0, 255, 170, 0.2);
            border-radius: 10px;
            font-size: 13px;
            color: var(--accent);
            align-items: center;
            gap: 8px;
            justify-content: center;
        }
        .success-msg.active {
            display: flex;
            animation: fadeUp 0.4s ease both;
        }

        /* === Footer Note === */
        .footer-note {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: rgba(122, 139, 165, 0.5);
            animation: cardIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
        }
        .footer-note i {
            margin-right: 4px;
        }

        /* === Screenshots Preview === */
        .screenshots {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding: 4px 0;
            scrollbar-width: none;
        }
        .screenshots::-webkit-scrollbar { display: none; }
        .screenshot {
            min-width: 120px;
            height: 200px;
            border-radius: 14px;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.06);
            opacity: 0.85;
            transition: opacity 0.3s, transform 0.3s;
        }
        .screenshot:hover {
            opacity: 1;
            transform: scale(1.03);
        }

        /* === Version Badge === */
        .version-badge {
            display: inline-block;
            padding: 4px 12px;
            background: var(--accent-dim);
            color: var(--accent);
            font-size: 11px;
            font-weight: 500;
            border-radius: 20px;
            margin-bottom: 16px;
            letter-spacing: 0.3px;
        }

        /* === Responsive === */
        @media (max-width: 480px) {
            .main-wrapper { padding: 16px; }
            .app-card { padding: 28px 20px 24px; border-radius: 20px; }
            .app-name { font-size: 22px; }
            .app-icon-wrap { width: 80px; height: 80px; border-radius: 18px; }
            .app-icon-wrap i { font-size: 34px; }
            .screenshot { min-width: 100px; height: 170px; }
        }

        /* === Reduced Motion === */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <!-- Gradient Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Floating Particles Canvas -->
    <canvas id="bgCanvas" aria-hidden="true"></canvas>

    <!-- Main Card -->
    <main class="main-wrapper">
        <div class="app-card">

            <!-- App Icon -->
            <div class="app-icon-wrap">
                <i class="fas fa-rocket"></i>
            </div>

            <!-- App Name & Dev -->
            <h1 class="app-name">TOURNAMENT</h1>

            <!-- Screenshots -->
            <div class="screenshots">
                <img src="https://i.ibb.co/YBzjXfys/369cf4e491a9.jpg" alt="App Screenshot 1" class="screenshot">
                <img src="https://i.ibb.co/NnLQvT8y/3bb5cb3434b1.jpg" alt="App Screenshot 2" class="screenshot">

            <!-- Stats -->
            <div class="stats-row">
                <div class="stat-item">
                    <div class="stat-val">200+</div>

                </div>
                <div class="stat-item">
                    <div class="stat-val">8.5 MB</div>
                    <div class="stat-label">Size</div>
                </div>
                <div class="stat-item">
                    <div class="stat-val">0.92</div>
                    <div class="stat-label">Rating</div>
                </div>
            </div>

            <!-- ========================================== -->
            <!-- YAHAN APNA APK DOWNLOAD LINK DAALO -->
            <!-- Neeche href="" ke andar apni APK file ka URL paste karo -->
            <!-- ========================================== -->
            <a id="downloadLink"
               href="https://download1322.mediafire.com/bj06de2otmugb1hBgSU59SterUKJ-Y-DmnTGY7wDm8_5f6rVqSi1TI7S_RKJL5abhaWc855r2_WfkPJIf1iMdOJ6zS_R4bTGHxbEu6hERXxx-tzwPsSxUxzCiSgLu2aqKAyRwAvwnneABRRQw22aB3VukuT9vkfpKZ8hdGT3kEMSBdU/2c1cn8xxegvcbc6/TOURNAMENT.apk"
               download="MyApp.apk"
               class="download-btn"
               role="button"
               aria-label="APK Download karein">
                <i class="fas fa-download"></i>
                <span>Download APK</span>
            </a>

            <!-- Progress Bar -->
            <div class="download-progress" id="downloadProgress">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressFill"></div>
                </div>
                <div class="progress-info">
                    <span id="progressPercent">0%</span>

            </div>

            <!-- Success Message -->
            <div class="success-msg" id="successMsg">
                <i class="fas fa-check-circle"></i>

            </div>

        </div>

        <p class="footer-note">
            <i class="fas fa-shield-halved"></i>
            Virus free &bull; Secure download
        </p>
    </main>

    <script>
        // ============================================
        // FLOATING PARTICLES BACKGROUND
        // ============================================
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: -9999, y: -9999 };
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Mouse track karna for interaction
        document.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        document.addEventListener('mouseleave', () => {
            mouse.x = -9999;
            mouse.y = -9999;
        });

        // Particle class
        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * W;
                this.y = Math.random() * H;
                this.size = Math.random() * 2.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.6;
                this.speedY = (Math.random() - 0.5) * 0.6;
                this.opacity = Math.random() * 0.5 + 0.1;
                // Accent colors mein se random pick
                const colors = ['0,255,170', '0,201,255', '255,79,110', '255,179,71'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update() {
                // Mouse repulsion
                const dx = this.x - mouse.x;
                const dy = this.y - mouse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 120) {
                    const force = (120 - dist) / 120 * 0.8;
                    this.x += (dx / dist) * force;
                    this.y += (dy / dist) * force;
                }

                this.x += this.speedX;
                this.y += this.speedY;

                // Wrap around
                if (this.x < -10) this.x = W + 10;
                if (this.x > W + 10) this.x = -10;
                if (this.y < -10) this.y = H + 10;
                if (this.y > H + 10) this.y = -10;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, Math.max(0.1, this.size), 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color},${this.opacity})`;
                ctx.fill();
            }
        }

        // Particles banao
        const particleCount = Math.min(120, Math.floor((W * H) / 12000));
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        // Lines draw karo nearby particles ke beech
        function drawLines() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 130) {
                        const opacity = (1 - dist / 130) * 0.12;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(0,255,170,${opacity})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
        }

        // Animation loop
        function animate() {
            ctx.clearRect(0, 0, W, H);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            drawLines();
            requestAnimationFrame(animate);
        }
        animate();

        // ============================================
        // DOWNLOAD BUTTON LOGIC
        // ============================================
        const downloadBtn = document.getElementById('downloadLink');
        const progressDiv = document.getElementById('downloadProgress');
        const progressFill = document.getElementById('progressFill');
        const progressPercent = document.getElementById('progressPercent');
        const progressSize = document.getElementById('progressSize');
        const successMsg = document.getElementById('successMsg');

        const TOTAL_SIZE_MB = 8.5; // Apne APK ka size yahan set karo

        downloadBtn.addEventListener('click', function(e) {
            // Check karo ki link placeholder hai ya real link hai
            const link = downloadBtn.getAttribute('href');
            if (link === 'YAHAN_APNA_APK_LINK_DAALO' || link === '' || link === '#') {
                e.preventDefault();
                shakeButton();
                return;
            }

            // Progress bar dikhao
            progressDiv.classList.add('active');
            successMsg.classList.remove('active');
            downloadBtn.style.pointerEvents = 'none';
            downloadBtn.querySelector('span').textContent = 'Downloading...';

            let progress = 0;
            const interval = setInterval(() => {
                // Random increment for realistic feel
                progress += Math.random() * 8 + 2;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);

                    progressFill.style.width = '100%';
                    progressPercent.textContent = '100%';
                    progressSize.textContent = `${TOTAL_SIZE_MB} MB / ${TOTAL_SIZE_MB} MB`;

                    // Success dikhao
                    setTimeout(() => {
                        successMsg.classList.add('active');
                        downloadBtn.querySelector('span').textContent = 'Downloaded';
                        downloadBtn.querySelector('i').className = 'fas fa-check';
                        downloadBtn.style.background = 'linear-gradient(135deg, #00c9ff, #00ffaa)';
                        downloadBtn.style.pointerEvents = 'auto';

                        // 3 sec baad reset
                        setTimeout(() => {
                            downloadBtn.querySelector('span').textContent = 'Download APK';
                            downloadBtn.querySelector('i').className = 'fas fa-download';
                            progressDiv.classList.remove('active');
                            successMsg.classList.remove('active');
                            progressFill.style.width = '0%';
                        }, 3000);
                    }, 400);
                    return;
                }

                progressFill.style.width = progress + '%';
                progressPercent.textContent = Math.floor(progress) + '%';
                const downloaded = ((progress / 100) * TOTAL_SIZE_MB).toFixed(1);
                progressSize.textContent = `${downloaded} MB / ${TOTAL_SIZE_MB} MB`;
            }, 200);
        });

        // Button shake animation jab link nahi hai
        function shakeButton() {
            downloadBtn.style.animation = 'none';
            downloadBtn.offsetHeight; // reflow
            downloadBtn.style.animation = 'shake 0.5s ease';
            downloadBtn.style.background = 'linear-gradient(135deg, #ff4f6e, #ff6b8a)';
            downloadBtn.querySelector('span').textContent = 'Pehle link daalo!';

            setTimeout(() => {
                downloadBtn.style.animation = 'btnGlow 2.5s ease-in-out infinite';
                downloadBtn.style.background = 'linear-gradient(135deg, #00ffaa, #00c9ff)';
                downloadBtn.querySelector('span').textContent = 'Download APK';
            }, 2000);
        }

        // Shake keyframes inject karo
        const shakeStyle = document.createElement('style');
        shakeStyle.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                15% { transform: translateX(-8px) rotate(-1deg); }
                30% { transform: translateX(6px) rotate(1deg); }
                45% { transform: translateX(-6px) rotate(-0.5deg); }
                60% { transform: translateX(4px) rotate(0.5deg); }
                75% { transform: translateX(-2px); }
            }
        `;
        document.head.appendChild(shakeStyle);
    </script>

</body>
